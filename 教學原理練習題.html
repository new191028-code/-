主題二：討論、發表與腦力激盪法
【觀念重點】
討論教學法：  目的在培養思考能力、溝通以形成共識。不適合用來教固定步驟（如洗手）。坐位安排以「圓圈」最佳。教師在過程中需適時引導並作歸納。
發表教學法：  鼓勵學生用語言、文字、動作等多元方式表達知識與情感。
腦力激盪法 (Brainstorming)：  激發擴散思考。核心原則： 延遲批判（先不做評價） 、量孕育質（點子越多越好）、自由滾思、歡迎搭便車（結合或修改他人點子）。在「聚斂階段」才進行可行性評估篩選。

主題三：問題導向、專題探究與道德討論法
【觀念重點】
道德討論法：  利用「兩難故事」引發認知失調與道德思考，透過詰問與辯論發展道德判斷力，而非直接灌輸標準答案。
問題導向學習 (PBL)：  提供真實、開放且無單一標準答案的「不良結構問題」（如文法問題不適合，因為有標準答案）。強調學生主動學習、小組合作解決，教師扮演催化者/引導者。
專題導向教學 (Project-Based)：  學生針對特定主題提出假設、收集資料、實地探查，最後產出專題報告或實體成果。
【全部題目】道德討論法

主題四：情境認知、錨式教學與認知學徒制
【觀念重點】
情境認知與錨式教學：  基於建構論觀點，主張學習應置於真實的社會與物理脈絡中。錨式教學法將問題「錨定」在複雜、寫實的情境（常透過影音多媒體），讓學生從中發現並解決多重問題。
認知學徒制：  將傳統手工學徒制應用於心智歷程。教師透過「示範、指導（鷹架）、逐漸撤除支持（褪除）」的過程，最終讓學生獨自完成學習與問題解決。
【全部題目】情境認知與錨式教學

主題五：概念獲得與探究教學法
【觀念重點】
概念獲得法 (Concept Attainment)：  讓學生透過分辨「正例」與「反例」的特徵，自己歸納出事物的屬性並下定義。
探究教學法：  讓學生經驗科學家做研究的歷程。流程包含：提出問題、形成假設、蒐集與分析資料、形成解釋與結論。重視「過程」大於直接給予答案，並強調證據的運用（如矛盾事件法可引發探究動機）。
【全部題目】概念獲得教學法

主題六：創造力發展與創造思考教學
【觀念重點】
創造力的四大要素：  流暢性（點子數量多）、變通性（類別跨度大、觸角廣）、獨創性（新奇罕見）、精密性/精進力（添加細節使其完善）。
Wallas 創造思考歷程：  準備期→醞釀期→豁朗期（靈光一閃）→驗證期。
教學策略：  提供支持創意的文化（不急著批判、容忍不同意見）、使用擴散性問題、運用「奔馳法 (SCAMPER)」、「自由聯想」等。智商高不代表創造力一定高，但高創造力者通常具備自信、獨立及幽默感。
【全部題目】創造力與內涵
下列何者提到夢是來自潛意識最深層的訊息，是創造力的來源？ (A)佛洛依德 (B)阿德勒 (C)榮格 (D)皮爾斯【解答：C】
下列何者與創造力最沒有直接關係？ (A)具有聯想、擴散思考的能力 (B)可訂定明確的目標，具有精確的執行力 (C)能夠忍受對未來的不確定性，勇於探索 (D)具有好奇心，願意嘗試新事物、接受新觀念【解答：B】
有關創造力課程設計的描述，下列哪些較為適切？甲、須兼顧領域知識、創造思考技巧及有助於創造的情意特質 乙、課程實施歷程應定期監控... 丙、課程設計須兼顧擴散性思考及聚斂性思考 丁、透過精熟學習的設計理念... (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：B】
下列有關洪老師進行創造力教學的敘述，何者正確？ (A)引導幼兒跳脫生活經驗... (B)鼓勵幼兒多使用擴散思考，避免使用聚斂思考 (C)使用「比較」的問題提問，避免幼兒創意單一化 (D)避免使用外在獎賞方式...【解答：C】
教師若想要培養學生的創造力，下列何種作法最可能達到效果？ (A)教師要有權威感... (B)要不斷練習基本題型... (C)鼓勵學生自由交換意見及嘗試各種不同的學習方式 (D)教材的深度加深...【解答：C】
洪老師發現班上有位資優學生只投入於感興趣的課程...針對該生的行為特徵，洪老師提供下列哪些輔導方式較為適切？甲、運用團體諮商... 乙、提高自我概念... 丙、提供能展現創造力的挑戰性環境 丁、提供多元探索機會擴大興趣範圍 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：D】
下列哪一項輔導技巧最有助於啟發幼兒的創造力？ (A)提供解決問題的機會 (B)隨時糾正幼兒的看法 (C)直接幫幼兒解決問題 (D)對每位幼兒都一視同仁【解答：A】
下列有關自製樂器的描述，何者正確？ (A)自製樂器可促進幼兒的創造力與想像力 (B)自製樂器造型複雜... (C)自製樂器容易損壞... (D)自製樂器音色不精準...【解答：A】
下列何項活動較有助於幼兒的創造力發展？ (A)玩跳房子遊戲 (B)依照摺紙步驟圖示，逐步摺出紙飛機 (C)在百科全書內找到鍬形蟲，用彩色鉛筆畫下其造型 (D)用紙箱、捲筒、瓶罐、色紙等素材設計製作「我的家」【解答：D】
小明是普通班的成績優異學生，他有自己獨特的想法和看法，也喜歡挑戰權威...請問小明最有可能具備下列哪一項資優特質？ (A)創造力 (B)學術性向 (C)領導才能 (D)其他特殊才能【解答：A】
有關創造能力資優學生身心特質之描述，下列何者較適切？ (A)高創造力者通常具有較高的領導才能 (B)高創造力者通常具有自信、獨立及開放的態度 (C)進行擴散思考任務時，較會受到習慣定向的影響 (D)神經質人格特質與科學創造力有正相關...【解答：B】
下列哪些教學情境有助於發展資優學生的創造力？甲、賦予責任感與獨立性 乙、將工作與玩樂加以區分 丙、鼓勵彼此批判力求創新 丁、強調異中求同、同中求異 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：B】
下列何者是高創造力青少年最可能具備的特徵？ (A)強調立即滿足 (B)傾向聚斂性思考 (C)較具彈性富幽默感 (D)一定是資賦優異者【解答：C】
下列哪一項並非高創造力者的主要特徵？ (A)不容易固著於既有的問題解決方法 (B)各方面知識的學習速度比一般人快 (C)短時間內能針對問題產生大量點子 (D)能將看似無關連的問題聯結在一起【解答：B】
就創造力優異與一般智能優異的關係而言，下列敘述何者較不適切？ (A)智商愈高者，其創造力也愈高 (B)智力測驗並非創造力優異學生鑑定的必要工具 (C)創造力測驗並非一般智能優異學生鑑定的必要工具 (D)一般智能優異與創造能力優異是兩種不同的資優類型【解答：A】
黃老師在資優班校外教學課程中...帶領學生到附近的市場進行主題教學...下列哪些安排較能激發學生的批判力與創造力？甲、讓學生重新定位市場的功能與營運方式 乙、比較並分析傳統市場與黃昏市場的異同 丙、讓學生依據社區的特性規劃一個新的市場 丁、訪問傳統市場的老攤販，寫一本市場人生 (A)甲乙丙 (B)乙丙丁 (C)甲乙丁 (D)甲丙丁【解答：D】
有關創造力的敘述，下列何者是正確的？ (A)高智力者有高創造力 (B)創造力的發展受遺傳的影響大於環境 (C)創造力是智力結構中的聚斂思維 (D)社會規範與傳統標準會阻礙創造力的發展【解答：D】

主題七：批判思考、交互教學與價值澄清法
【觀念重點】
批判思考教學：  教師提供多元資源，引導學生分析報導立場、澄清價值、發現不符常理之處，而非灌輸單一答案。
交互教學法：  目的為促進閱讀理解。包含四大策略：摘要、澄清、預測、發問。師生與同儕輪流扮演教師角色。
價值澄清法：  幫助學生建立個人價值觀的過程，包含選擇（條列清單、排序）、珍視（公開分享與捍衛）與行動。前提是「沒有人可以傳輸絕對正確的價值給別人」。

主題八：合作學習與協同教學
【觀念重點】
合作學習法：  重視異質分組、積極互賴、面對面互動、個人績效與團體歷程。
STAD (小組成就區分法)：  計算個人的「進步分數」作為小組評比依據。
Jigsaw (拼圖法)：  將內容分段，各組派人組成「專家小組」研討後，回原組教導同儕。
協同教學法：  打破班級界線，由多位教師組成教學群，依專長分工合作，實施大班教學或小組指導。
【全部題目】合作學習與策略

有關資優學生的合作學習，下列哪一項敘述較為適切？ (A)採用同質分組 (B)教師扮演旁觀者的角色 (C)小組的成功立基於每位組員的成功 (D)鼓勵小組成員彼此競爭以提高學習效能【解答：C】
教師如何運用合作學習，才能讓所有學生包括資優學生都受益...下列哪些較為適切？甲、盡量在同質性高小組學習... 乙、規劃作業讓有困難學生個別操作，完成後再與小組結合 丙、不要在意不努力同學... 丁、只進行團體評分 (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：C】
「合作學習」是近年頗受重視的教學法，對於內涵說明何者較為正確？ (A)教師對全班進行直接教學... (B)教師依據特性分派不同任務 (C)教師在教材內容需考慮適應 (D)教師先進行教學並交代學習任務，讓學生在小組中討論【解答：D】
有關資優學生的合作學習，下列哪些敘述較為適切？甲、適用於強結構問題... 乙、不適合安排競賽... 丙、規劃開放式任務，讓學生皆有貢獻 丁、不同的學校之間也可進行合作學習 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：D】
陳老師採用分組合作學習法進行數學教學...每星期累積解出最多題的小組就能得到獎勵...學生數學成績並沒有進步。最可能缺乏合作學習的哪一個成分？(A)個人績效 (B)認知學徒 (C)團體目標 (D)直接教學【解答：A】
下列何種教學法注重個人績效對團體的貢獻？ (A)欣賞教學法 (B)討論教學法 (C)合作學習法 (D)協同教學法【解答：C】

STAD、拼圖法與團體探究法
(STAD) 下列做法，何者最符合合作學習教學法的「學生小組成就區分法」？ (A)將學生同質分組後...表揚最佳學生 (B)將學生異質分組後...各自研究後互相教導 (C)將學生異質分組後...進行遊戲競賽... (D)將學生異質分組後，進行小組討論。於討論後，對學生進行個別測驗，再加總個別的進步成績，以評定各小組的表現【解答：D】

協同教學法
光明國中國文、自然與生活科技及數學學習領域的教師一起爲八年級學生規劃並實施一套名為「花落誰家」的課程。這群教師所採用的是何種教學方法？ (A)探究教學法 (B)協同教學法 (C)合作學習教學法 (D)創造思考教學法【解答：B】
同一學習領域或同一學群的教師組成教學群，共同設計教學計畫，依專長分工合作，並對班群的學生實施大班教學、小組討論或個別指導等方式的教學。這屬於下列哪一種教學方式？ (A)分組教學法 (B)編序教學法 (C)練習教學法 (D)協同教學法【解答：D】

下列何者不屬於協同教學的特色？ (A)分工合作的專業對話 (B)彈性多元的教學模式 (C)單純有效的班級管理 (D)學生學習的個別適應【解答：C】
下列何種教學模式最可能更改教師的組織，讓教師以教學群的方式來進行教學，並共同佈置教學情境？ (A)直接教學法 (B)發現教學法 (C)協同教學法 (D)批判思考教學【解答：C】
主題九：差異化教學、文化回應與各類教學模式
【觀念重點】
差異化教學：  因應學生的程度、學習風格與興趣，提供多元的內容、過程與評量（例如多層次教學）。評量應貫穿整個學習歷程（形成性），而非只在學習活動之後。
文化回應教學：  將學生的母文化（如原住民手工藝、電影）融入學科教學，提升學習動機與自我認同。
學習共同體與公開授課：  佐藤學提倡。強調公共性（打開教室大門），透過說課、觀課（觀察學生的學習狀況而非評價老師）、議課來共同成長。
單元與設計教學法：  克伯屈設計教學法強調學生自訂計畫，並重視主學習與同時學習（副學習-態度；附/輔學習-相關概念）。單元教學則注重：準備、發展、綜合活動。
【全部題目】差異化與適應式教學
教師安排不同難度及進度的學習任務，設計多元評量方式，使班上每位學生都能充分學習，提升自我效能。此教學設計較符合下列何種理念？ (A)直接教學法 (B)差異化教學 (C)建構式教學 (D)探究教學法【解答：B】
下列敘述何者較不符合差異化教學的理念？ (A)評量多發生於學習活動之後 (B)注重學生的學習興趣與需求 (C)多元且具選擇性的學習活動 (D)重視學生個人的成長與進步【解答：A】
下列何者較不符合差異化教學的原則？ (A)進行分組教學時，由能力較高者指導能力較低者 (B)對於能力較高及較低的學生，另訂評量的標準 (C)提供多樣性的教材內容 (D)允許能力較高者加速學習，並對能力較低者進行補救教學【解答：A】
林老師注意到班上有些學生，可以從抽象概念發現具體答案...有些則會使用具體經驗...林老師的教學能因應學習者的何種差異？ (A)先備能力 (B)學習風格 (C)自我期望 (D)自我效能【解答：B】
教師進行數學加法進位單元時...利用小方塊教具讓不瞭解的學生透過具體操作瞭解概念。此做法屬於下列何種性質的差異化教學？ (A)學習內容 (B)學習方法 (C)學習興趣 (D)學習評量【解答：B】
下列何者屬於教師調整學生學習速度的策略？ (A)改變課程標準 (B)教師允許能力較高的學生學習進度超前 (C)決定學習較遲緩者放棄內容 (D)決定一種適合所有學生的內容【解答：B】
晴空國小教師社群發現學生的能力差異大，想進行差異化教學。下列策略何者較為合宜？ (A)提供數位學習平臺上網多練習 (B)給予相同的學習任務與標準 (C)依據學生能力高低提供不同認知層次的學習任務 (D)進行同質性分組給予相同鷹架【解答：C】
面對補救教學學生程度參差不齊、缺乏教材現況，吳老師應優先考慮下列何者？ (A)強調學科知識的吸收 (B)呼應學生的個別差異 (C)重視科技媒材的應用 (D)強調社會問題的反思【解答：B】
當前臺灣國民小學屬於義務教育，個別差異極大。下列因應策略何者錯誤？ (A)應加強校舍建築 (B)降低班級學生人數 (C)優先降低低年級班級規模 (D)鼓勵教師發揮小班教學多元適性的精神【解答：A】
面對學生程度落差大的問題，下列哪些做法較符合差異化教學的精神？甲、設計不同的學習單 乙、安排不同的學習活動 丙、採用相同的評量題目 丁、進行分組以因材施教 戊、先評估學生程度再進行 己、分為高低兩組以激勵低程度組 (A)甲乙丙戊 (B)甲乙丁戊 (C)乙丁戊己 (D)丙丁戊己【解答：B】
(適應式) 李老師想要在一群個別差異很大的學生之間，達成一致性的教學目標，他應使用以下哪一種方式較合適？ (A)直接式教學 (B)間接式教學 (C)適應式教學 (D)交互式教學【解答：C】
文化回應、翻轉與學習共同體
(文化回應) 麗麗老師讓原住民學童從快失傳的手工藝、醃魚、織布中，發現科學概念。這種作法屬於下列哪一種教學取向？ (A)直接教學 (B)間接教學 (C)連結式教學 (D)文化回應教學【解答：D】

下列何者最符合文化回應教學的特性？ (A)運用101大樓教體積 (B)運用地圖規劃行程 (C)透過鹽水蜂炮教安全 (D)透過《賽德克●巴萊》電影引導原住民學生探索自我【解答：D】

公開授課旨在幫助教師暸解學習者的困難之處...下列哪些議課回饋較能達成此目的？甲、台風很好速度太快 乙、講解絕對值時同學茫然 丙、未制止講髒話同學 丁、20號同學完全未參與討論，一直畫圖 (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：C】
有關教師進行同儕觀課，「解釋論」較關注下列哪一項重點？ (A)邀請專家提供統計 (B)觀課者要理解被觀課教師的教學意識及班級獨特性 (C)避免主觀判斷遵守客觀指標 (D)關注社會結構再製現象【解答：B】
劉老師安排ㄇ字型座位，異質分組...編製加深加廣教材，要求預習複習。劉老師的教學較偏向何種教育理念？(A)精熟學習 (B)協同教學 (C)學習共同體 (D)生命共同體【解答：C】
某國小辦理公開授課，以下選項何者正確？甲、不包含聘期三個月以內之代課代理教師 乙、採取縣市主管行政機關辦法 丙、包括共同備課、接受觀察及回饋三部分 丁、開學前一個月公告於網頁 (A)甲丙 (B)乙丁 (C)乙丙 (D)甲丁【解答：A】
(可汗學院) Salman Khan 創辦的可汗學院，其課程理念主要著重下列何者？ (A)實地體驗 (B)社區廣泛學習 (C)學生透過網路觀看教學影片進行自主學習 (D)教師主導【解答：C】
有關推動「翻轉教室」的敘述，何者錯誤？ (A)授課內容預先錄製作為家庭作業 (B)更容易讓學生自我控速 (C)教師在上課時，先根據影片進行講解，再讓學生討論並提出心得 (D)縮短教師講解時間，增加討論互動機會【解答：C】

(角色扮演) 在社會課中想運用角色扮演法，下列作法何者較不適切？ (A)事先編寫好劇本且進行排練，以增加上臺的成功經驗 (B)選用熟悉故事 (C)演出後簡短討論並變化角色 (D)時間不用太長，不妥時適時引導【解答：A】

教師協助幼兒透過角色扮演並強調關注他人的感受，下列何者是培養社會能力的重點目標？ (A)幫助幼兒發展同理心 (B)理解隱私權 (C)發展自我認同 (D)發展自我延伸概念【解答：A】
有關教學方法的敘述，下列何者正確？ (A)討論目的是想法一致 (B)講述法幼兒聆聽就能學習 (C)問題解決宜抽離真實情境 (D)角色扮演法能讓幼兒透過情境體驗他人角色和學習解決問題【解答：D】

(設計教學) 下列何種教學法強調學生自訂學習計劃？ (A)練習教學法 (B)發表教學法 (C)設計教學法 (D)批判思考教學法【解答：C】

主題十：教師法規、專業倫理、教師權威與教科書
【觀念重點】
教師法與委員會：  《教師法》規範聘任、解聘與待遇等。初聘、續聘、解聘由「教師評審委員會」審議；申訴則由「教師申訴評議委員會」處理。
教師專業與權威：  教師需具備「專業自主性」（如選擇教學方法）。教師權威包含傳統權威、專業權威（奠基於學術知能）。若教師要求學生「不准質疑」，是誤用了學術權威。
教科書選用：  由學校「校務會議」訂定辦法公開遴用。選擇教科書應注重「內容屬性」及「教學屬性」。教師不是傳遞教科書的機器（防範教師），而應視學生需求適時轉化教材。
【全部題目】教師法規與委員會
在我國，下列哪一種教育法令必須經過立法院三讀審查，才能通過？ (A)教育人員任用條例 (B)國民教育法施行細則 (C)師培審議設置要點 (D)進修辦法【解答：A】
下列哪一項法律規定我國教師資格檢定與審定、聘任、待遇等事項？ (A)教育基本法 (B)師資培育法 (C)國民教育法 (D)教師法【解答：D】
依據＜教師法＞，有關高級中等以下學校教師聘任期限的敘述，下列何者是正確的？ (A)初聘為兩年 (B)續聘三年以上者，得以長期聘任 (C)長期聘任的任期由教育部訂定之 (D)續聘第一次為一年，爾後每次為兩年【解答：D】
根據「教師法」規定，下列有關我國教師權利義務的敘述，何者正確？ (A)從事與教學有關之研究及進修等，既是教師權利，也屬教師義務 (B)不得拒絕無關指派 (C)得視情況透露個資 (D)決定是否擔任導師【解答：A】
各級學校教師在職期間應主動積極進修...教師進修研究獎勵辦法，由哪一個機關訂定之？ (A)教育部 (B)內政部 (C)立法院 (D)直轄市及縣(市)政府【解答：A】
下列哪一個法規明定教師權利義務、保障工作與生活，以提升專業地位？ (A)教師法 (B)國民教育法 (C)教育基本法 (D)師資培育法【解答：A】
教師退休金如果各級公立學校出現問題時，應由下列何者負擔最後支付保證責任？ (A)政府 (B)學校 (C)教師會 (D)學校與教師【解答：A】
依據「教師法」，現職不適任或身體衰弱不能勝任者，報經核准後，如何處理？ (A)予以資遣 (B)予以停聘 (C)予以解聘 (D)予以不續聘【解答：A】
依規定，下列何者屬於追求公平、公正的「實質正義」項目？ (A)教評委員任期一年 (B)教評會五至十九人 (C)委員由全體推舉 (D)受監護或輔助宣告，尚未撤銷，方得被解聘【解答：D】
教師初聘、續聘之審查與解聘、停聘及不續聘之審議，屬下列何者之權限？ (A)校務會議 (B)行政會議 (C)教師評審委員會 (D)教師申訴評議委員會【解答：C】
教師傳閱黃色書刊經調查屬實...此審議事項是屬於何者之權限？ (A)校務會議 (B)行政會議 (C)教師評審委員會 (D)申訴評議委員會【解答：C】
負責教師資遣原因認定之審查事項的法定單位，係指哪一委員會？ (A)性平會 (B)考績會 (C)教師評審委員會 (D)申訴會【解答：C】
教師評審委員會有 15 位成員，若李老師希望獲得長期聘約，至少須經多少委員審查通過？ (A)8 人 (B)10 人 (C)12 人 (D)14 人【解答：B】
學校擬召開教評會解聘某教師，下列哪一項違反其運作規定？ (A)姻親迴避 (B)決議會議必須有委員二分之一以上出席才有效 (C)給予當事人陳述機會 (D)當然委員含校長家長教師代表【解答：B】

陳老師在進行《三隻小豬》故事之前，請幼兒回想《七隻小羊》故事中小羊應付大野狼的策略... 陳老師運用的教學方法較符合下列何項觀點？ (A)行為主義中的行為塑造技術 (B)多元智能理論中的專題研究 (C)合作學習理論中的共同學習法 (D)有意義的學習理論中的前導組織【解答：D】
根據奧蘇貝爾(D. Ausubel)的學習理論，諾瓦克(J. Novak)發展出以「概念構圖」(concept mapping)作為教學評量工具。請問，下列有關概念構圖的敘述較為正確？(A)無法用來客觀計分 (B)難以評估學習者的創造力 (C)是有意義的結構化學習法 (D)僅適合用於陳述性知識評量【解答：C】
有關心智圖法的敘述，下列哪一選項較為適切？甲、心智圖是聚斂性思考的體現 乙、鼓勵學生多用左腦思考，習慣螺旋式思維 丙、採用放射狀思考法模擬大腦運作，發揮大腦「放射性」思考功能 丁、運用視覺化技巧，將不同的概念和要點，組成合理而有系統的圖像 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：D】
張老師上國文課時利用各種概念構圖，如：蛛網圖、階層圖等，幫助學生理解文意與文章結構。以下何者最不符合概念構圖的主要功能？ (A)鼓勵學生合作 (B)釐清學習重點 (C)進行學習摘要 (D)提供視覺路徑【解答：A】
資源班李老師在學習策略課中教小雲以心智圖歸納課文的重點。... 李老師可以採用下列哪一選項的策略協助小雲的學習？甲、要求小雲在普通班重複使用心智圖歸納重點 乙、在學習策略課重新教導使用心智圖的步驟 丙、在普通班和資源班使用同樣的步驟提示 丁、在普通班教導小雲進行自我教導策略 (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：B】
小花是國中一年級的學習障礙學生... 下列哪一種輔具較能提升小花的閱讀成效？(A)文字轉換成語音的軟體 (B)語音轉換成文字的軟體 (C)關鍵詞彙與圖片聯結的軟體 (D)文章轉換成概念構圖的軟體【解答：D】
大倫是七年級的學習障礙學生... 針對大倫的問題，教師採用哪一選項的教學措施教導大倫較為適當？甲、使用語音輸入軟體摘述文章大意 乙、使用自我監控檢核表檢視文章重點 丙、利用電腦軟體將關鍵字與圖片聯結 丁、利用電腦軟體將文章轉換為概念構圖 (A)甲丙 (B)甲丁 (C)乙丙 (D)乙丁【解答：D】
資優班陳老師以概念構圖教學模式，進行「甲殼動物的生態」課程，下列哪些作法有助於此課程的實施？甲、請專家協助審查... 乙、應先由教師完整講述... 丙、強調學生繪製的...與教師提供範本的相似程度 丁、教學前應分析學生的學習特質，並評估其對「甲殼動物的生態」了解情形 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：B】
學生在國語課學會摘要課文大意的技巧後，教師若想設計學習任務以協助學生學習遷移，下列哪一項任務較為適切？ (A)運用顯微鏡操作步驟進行蚊子的觀察 (B)運用心智圖畫出社會課文的重要概念 (C)運用數線或畫圖方式表示數學的解題過程 (D)運用檢核表紀錄生活情緒的覺察與因應策略【解答：B】
如果一種評量強調受試者依其既有的先備知識作為基礎，將新學習連結到舊知識之上，統整調和成一個有組織、有系統、有階層的知識結構，這屬於何種評量？(A)真實性評量(B)檔案評量(C)概念圖評量(D)總結性評量【解答：C】
有關資優學生心智圖教學的作法，下列哪些較為適切？甲、明確告知學生評分的面向及標準 乙、學生腦力激盪過程中教師不需給提示 丙、已完成的心智圖作品不適合再重組修正 丁、可採團體創作方式，讓每位學生有所貢獻 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：B】
教師利用一朵百合花，直接告訴幼兒這是花瓣、花蕊和葉子... 教師這種做法較屬於奧蘇貝爾學習觀點的哪一個層面？ (A)機械式發現學習 (B)機械式接受學習 (C)有意義的發現式學習 (D)有意義的接受式學習【解答：B】
奧蘇貝爾認為，教師若能把學生在某一領域學習所獲得的知識，用來促進其在另一領域的學習... 稱這種現象為何？ (A)階層遷移 (B)訓練遷移 (C)垂直遷移 (D)水平遷移【解答：D】
奧蘇貝爾曾以衛星化(satellization)理論描述青少年的何種發展？ (A)認知學習 (B)自我概念 (C)同儕關係 (D)親子關係【解答：D】
下列何者較屬於學習「負遷移」(negative transfer)的現象？ (A)學生無論用各種方法，都學不會小數的借位減法 (B)學生根據其對整數的認識：三位數比二位數大，因此判定「3.5 < 3.21」 (C)學生在瞭解三角形面積計算後，無法推論出平行四邊形面積計算的方法 (D)學生累積整數乘法和除法的計算經驗後歸納認為「整數乘法的結果變大，除法的結果變小」【解答：B】
教師在進行「過年」的主題教學前，在團體討論時詢問幼兒對於「過年」知道些什麼及想學些什麼。下列哪一種方式較適合用來記錄幼兒的想法？ (A)概念圖 (B)檢核表 (C)活動照片 (D)繪畫作品【解答：A】
教師可用下列何種圖表記錄幼兒對於主題的相關概念或經驗？ (A)曲線圖 (B)網狀圖 (C)剖面圖 (D)趨勢圖【解答：B】
主題二：布魯納 (Bruner) 認知表徵與發現學習
【觀念重點】 布魯納相信任何學科皆能以有效方式教給兒童，認知表徵分為三階段：動作表徵期、影像(形象)表徵期、符號表徵期。課程編排上提倡「螺旋式課程」，教材隨年級加深加廣。教學法上推崇「發現式學習」，引導學生直覺思考、探索知識，並重視內在動機的作用與引導學習心向。
【全部題目】
哪一位學者強調「在學習較複雜的技能之前，需先精熟某些基本技能」？ (A)皮亞傑 (B)布魯納 (C)桑代克 (D)維高斯基【解答：B】
洪老師認為如依據學生的認知結構進行教學，則再難的概念他都有辦法把學生敎會。這是呼應下列哪一位學者的主張？ (A)皮亞傑 (B)布魯納 (C)維高斯基 (D)史金納【解答：B】
美國心理學家布魯納曾說：「任何學科皆能以學生所能了解的有效方式進行教學」...針對孩子的認知方式呈現出該學科的哪一面向？ (A)核心技能 (B)基本結構 (C)演變歷史 (D)認知策略【解答：B】
有關布魯納和奧蘇貝爾的教學觀點，下列哪些敘述正確？甲、兩者皆主張減少被動的機械式學習 乙、前者重視講解教學方式；後者重視啟發教學方式 丙、兩者皆主張教學應促成意義化概念的取得，使遷移、保留及學習動機最大化 丁、前者認為教師應提供學習者組織過的訊息；後者認為應引導... (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：B】
幼兒藉由看、摸、聞檸檬，並試嚐自己調製的檸檬汁來認識檸檬，這是布魯納所提出認知表徵發展階段哪一期的特徵？ (A)圖像表徵期 (B)動作表徵期 (C)符號表徵期 (D)意義表徵期【解答：B】
學生在教室中把相同大小的積木放進長方形與正方形的框架中... 學生們的學習行為屬於哪一種認知表徵方式？ (A)動作表徵 (B)影像表徵 (C)具體表徵 (D)符號表徵【解答：A】
很多還不識字的幼兒看到麥當勞兩個黃色拱門的招牌時，都會興奮地說：「麥當勞！」...幼兒運用什麼樣的記憶能力？ (A)動作表徵 (B)影像表徵 (C)反思表徵 (D)後設認知【解答：B】
二至六歲的兒童，可以透過真實的狗、相片中的狗、或圖片中的狗，形成對狗的形象，進而理解狗為何物。這屬於布魯納認知發展理論中的哪一個階段？ (A)動作表徵期 (B)形象表徵期 (C)符號表徵期 (D)思辨表徵期【解答：B】
二歲的小芬模仿昨天看到媽媽在廚房做獅子頭的動作，此行為顯示的是下列哪一種心智表現？ (A)表徵能力 (B)物體恆存 (C)質量保留 (D)橫跨式推理【解答：A】
秀秀和婷婷正在玩扮演遊戲...婷婷邊說邊比出按遙控器的動作，連續比了三次。婷婷的行為顯現她具備下列哪些能力？甲、快速配對能力 乙、心理表徵能力 丙、唱數計數能力 丁、延宕模仿能力 (A)甲乙 (B)乙丙 (C)乙丁 (D)丙丁【解答：C】
下列何者是延宕模仿的重要意義？ (A)嬰兒可以追蹤正在移動中的事物 (B)嬰兒從此可以開始學習新的事物 (C)嬰兒可以從經驗中建立象徵性表徵 (D)嬰兒可以模仿眼前父母所做出的表情【解答：C】
根據有關幼兒符號象徵能力的研究顯示...兩歲半組幼兒缺乏下列哪一種能力所致？ (A)雙重表徵 (B)符號表徵 (C)直覺思考 (D)邏輯思考【解答：A】
三歲的小威相信外表就是事實...此現象最有可能是因為小威還無法熟練地進行下列哪一種思維？ (A)雙重表徵 (B)邏輯思考 (C)自我中心 (D)重量保留【解答：A】
四歲的阿銘知道迷你玩具藏在真實房間的縮小模型裡，並能在真實房間的相對位置找出大玩具。下列何者最能反映出阿銘表現的認知能力？ (A)同化 (B)類包含 (C)幾何能力 (D)雙重表徵【解答：D】
幼兒每天進教室時，先畫下今早的心情；離園前，再畫下當天園內生活的日記畫...較有助於幼兒哪些能力的發展？甲、表徵能力 乙、表達能力 丙、實驗能力 丁、自省能力 (A)甲乙丙 (B)甲乙丁 (C)甲丙丁 (D)乙丙丁【解答：B】
下列哪一項做法最能呈現幼兒對於「花」的表徵能力？ (A)提供各種花的立體拼圖... (B)提供各種花的著色卡片... (C)提供各種繪畫素材和畫板，讓幼兒畫一朵自己最喜歡的花 (D)提供各種著名畫家所繪製的花卉圖片與水彩畫紙供幼兒臨摹【解答：C】
下列有關幼兒扮演遊戲的敘述，何者較適宜？ (A)幼兒從事扮演遊戲主要是為了進行遊戲治療 (B)幼兒在喬裝扮演中，會運用到許多的表徵能力 (C)典型自閉症幼兒從事扮演遊戲與一般幼兒無異 (D)幼兒玩扮演遊戲時，不宜扮演與自己性別不同的角色【解答：B】
四位幼兒在扮演區進行假扮遊戲...依據遊戲轉換理論，下列敘述何者錯誤？ (A)以玩物而言，演媽媽的幼兒比演爸爸的幼兒有較佳的表徵品質 (B)以角色而言，演小狗的幼兒比演小孩的幼兒有較佳想像的表徵層次 (C)以主體而言，演其他角色的幼兒比演自己的幼兒有較多的取替表徵 (D)以主題而言，遊戲的主題內容和日常生活越相似則表徵範圍較有限【解答：A】
社會學習領域課程綱要中提到：「因果、互動、結構是分析歷史變遷的重要概念。」此一敘述所表徵的是下列何者？ (A)事實(fact) (B)概念(concept) (C)通則(generalization) (D)理論(theory)【解答：C】
柏翰的媽媽發現自己的兒子在進入高中以後，在學習及課業出現一些改變，下列哪一種最不可能發生？ (A)開始訂定學習計畫 (B)喜歡假設並加以驗證 (C)用表徵物輔助加減演算 (D)數學基本運算速度比較快【解答：C】
關於螺旋型課程的敘述，下列何者錯誤？ (A)重視教材的邏輯結構 (B)歸納法是常用的教學法 (C)強調學科基本概念結構 (D)教材內容以能力本位為原則【解答：D】
下列何者並非螺旋式課程考量的重點？ (A)學科結構的邏輯順序 (B)學生的認知結構與發展 (C)學生當下的需要與興趣 (D)針對重要概念持續加廣加深【解答：C】
以教導「認識臺灣」主題為例，下列何者較接近螺旋式課程的要旨？ (A)先學習「臺灣」的地理位置... (B)先學習「臺灣」各地的風土民情... (C)先學習「北臺灣」，再學習「中臺灣」... (D)先學習「臺灣的地理環境」，再學習「臺灣的產業發展」，再接著學習「臺灣的經濟變遷」【解答：D】
下列有關螺旋式課程設計的敘述，何者較不適切？ (A)合乎學科知識結構 (B)循序提升學生認知能力 (C)概念要隨著年級加深加廣 (D)強調在地課程素材的轉化與發展【解答：D】
何老師在設計「生命週期」課程時...讓學生學習探究逐漸加深加廣的複雜概念。請問何老師的課程設計屬於下列哪一種？ (A)潛在課程 (B)平行課程 (C)活動課程 (D)螺旋課程【解答：D】
許老師在設計「環境教育」課程時...讓學生的學習逐漸加深加廣。請問，許老師的課程設計屬於下列哪一種？ (A)融合課程 (B)核心課程 (C)活動課程 (D)螺旋課程【解答：D】
教師手冊的教材地位分析...各單元的內容雖然部分相似、部分重複，不過範圍逐漸擴大，難度漸次提高。這屬於下列何種課程類型？ (A)融合課程 (B)螺旋課程 (C)相關課程 (D)核心課程【解答：B】
依據布魯納所提倡的螺旋式課程，下列何者為課程組織原則的綜合？ (A)順序性、繼續性 (B)統整性、銜接性 (C)銜接性、繼續性 (D)統整性、順序性【解答：A】
某版本教科書以「差異」為課程組織的要素...隨著學生年級增加，概念的抽象性與複雜性也增加的課程，屬於下列哪一種課程？ (A)同心圓課程 (B)螺旋式課程 (C)廣域式課程 (D)核心式課程【解答：B】
下列何者不符合布魯納發現學習的教學原則？ (A)教師應詳細說明學習情境及教材性質 (B)教材難易度應考量如何維持學生的動機 (C)教師需配合學生經驗，適當組織授課教材 (D)教材難度與邏輯順序需配合學生的心智發展【解答：A】
欲使發現式學習發揮最大之功效，教師在教學歷程中應把握哪些原則？ (1)安排適當情境 (2)可提出爭議性問題 (3)經常指名優秀學生回應作為示範 (4)提供方向或線索以引導學生發現知識 (A) (1)(2)(3) (B) (1)(2)(4) (C) (1)(3)(4) (D) (2)(3)(4)【解答：B】
張老師在黑板寫出「財」、「賄」、「費」、「販」等字...引導學生歸納出貨幣是從貝殼演變而來。此一教學策略較屬於下列何種理論的應用？ (A)迦納多元智能 (B)布魯納發現教學 (C)史金納操作制約 (D)奧蘇貝爾前導組體【解答：B】
下列何項教學活動較符合布魯納所主張的發現學習法？ (A)教師為幼兒講解... (B)教師提醒幼兒省水的重要性後... (C)教師運用圖示呈現水的循環歷程... (D)教師提供各種物品讓幼兒操作、觀察並預測其在水盆中浮沉的情形【解答：D】
布魯納提出發現式學習的概念，下列何項敘述符合其理論觀點？ (A)教師需要具有教學的熱誠... (B)學習環境需要有明顯的結構性... (C)二歲至六歲幼兒屬於動作表徵期... (D)內在性動機對於學習有正向影響，因此不宜過度使用外在性的獎賞與懲罰【解答：D】
某位學者認為當兒童的學習已進步時，應逐漸減弱外在的獎懲...上述是下列哪一位學者所提出？ (A)蓋聶 (B)皮亞傑 (C)布魯納 (D)布魯姆【解答：C】
有關發現式學習的敘述，何者有誤？ (A)教師應扮演催化者的角色 (B)教師應設法引導學生建構知識 (C)教師應設計讓學生探索的問題 (D)教學應以校外參觀的方式進行【解答：D】
下列哪一種教學法重視學生的直覺思考及對照比較等學習方式？ (A)直接教學法 (B)發現教學法 (C)編序教學法 (D)精熟教學法【解答：B】
下列有關發現教學法的敘述，何者最適當？ (A)發現教學法就是問題教學法 (B)發現教學法強調學習的領悟作用 (C)發現教學法的心理學基礎和編序教學法相同 (D)發現教學法適合量化的評量...【解答：B】
教師在運用發現學習法指導資優學生科學概念時，下列哪些教學理念較為適切？甲、擅於發問啟發學生思考 乙、鼓勵學生組織並活用資料 丙、安排由上而下的學習程序 丁、重視反省與問題解決思考過程的歷練 (A)甲乙丙 (B)乙丙丁 (C)甲乙丁 (D)甲丙丁【解答：C】
有關個體學習的論點，下列敘述何者正確？甲、維高斯基... 乙、奧蘇貝爾... 丙、布魯納的發現學習論主張學習者透過與環境的互動，主動探索...運用歸納推理... 丁、皮亞傑的認知發展理論認為認知結構的不平衡，是推動個體...動力... (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：D】
開始上課時，教師採取某些措施，讓學生做好心理準備，以儘快進入學習狀態。這是何種原則在教學情境的應用？ (A)同化作用 (B)心向作用 (C)平衡作用 (D)自動化作用【解答：B】

主題三：教學目標與行為目標敘寫
【觀念重點】 教學設計的第一步必須是決定教學目標。為了清晰明確，常透過「行為目標」敘寫，包含五大基本要素：學習主體、條件（情境）、行為（須使用明確動詞，如寫出、比較）、標準與結果。反對行為目標者則認為，並非所有的教育目標都能完全化為具體可觀察的行為。
【全部題目】
教學目標要明確清晰，至少必須包含三種因素，下列何者為正確？ (A)行為、情境、標準 (B)主體、行為、歷程 (C)情境、標準、歷程 (D)客體、行為、情境【解答：A】
設計教學活動時，首先要考慮的步驟是什麼？ (A)選用教學方法 (B)決定教學目標 (C)確定教學程序 (D)設定評量標準【解答：B】
教師在規劃耶誕節活動時，應先思考與釐清的項目為何？ (A)為什麼要辦這個活動？ (B)要辦理動態或靜態的活動？ (C)社區或家長可提供什麼資源？ (D)要規劃何種幼兒感興趣的活動？【解答：A】
教師希望教導學生「適切辨識網路資訊的價值性」。針對此一教學目標，下列敘述何者較為適切？ (A)設計線上標準化測驗題庫... (B)請學生上網搜集某議題的正反意見... (C)透過教學平台，投票表決... (D)提供學生立場不同的網路文章，請其提出比較與評論【解答：D】
松林國小四年級自然科學領域期中考試的一個考題是「本校大門口的百年榕樹是誰種的？」王老師認為此考題不當，其判斷之主要依據最可能為下列何者？ (A)不符合教學目標 (B)不符合學生認知發展 (C)不符合跨領域課程範疇 (D)不符合課程組織的順序性【解答：A】
林園長希望訂定園內幼兒的評量計畫，應最先確認下列哪一項目標？ (A)角落教學目標 (B)全園本學年教學目標 (C)主題教學目標 (D)活動行為目標【解答：B】
下列何項符合早期療育中自然教學取向的敘述？甲、須刻意安排... 乙、此教學取向的... 丙、教學目標須兼顧幼兒發展性和功能性的目標 丁、教學計畫須能自然地在幼兒家庭日常生活中執行 戊、分析幼兒生活環境，並將結果作為決定教學目標的參考依據 (A)甲乙丁 (B)甲丙戊 (C)乙丙丁 (D)丙丁戊【解答：D】
老師設計學習障礙兒童個別化教育計畫之教學目標時，下列何種資料幫助最大？ (A)標準化測驗結果 (B)醫療檢查結果 (C)家長觀察及意見 (D)學習表現檢核結果【解答：D】
下列哪一些是根據生態評量的原則，為重度障礙學生所設計的教學目標？甲、學生能夠指認... 乙、學生能指認... 丙、學生能在日常生活中辨識自己的名字 丁、當遇到困難的時候，學生能說請幫我 (A)甲乙 (B)丙丁 (C)甲丙 (D)乙丁【解答：B】
以下有關行為目標的敘述，何者有誤？ (A)行為目標適於表達高層次的複雜學習行為 (B)行為目標的陳述方式有助於清晰準確的溝通 (C)行為目標容易造成只注意部分而忽略整體的問題 (D)行為目標是把教學目標透過可以被觀察到的行為來表示【解答：A】
敘寫課程目標時，應使用意義較確定的「動詞」，讓課程目標更加清晰、明確。下列哪一個「動詞」較不恰當？ (A)知道 (B)寫出 (C)比較 (D)區別【解答：A】
下列哪一個動詞的運用，最符合行為目標的敘寫方式？ (A)知道 (B)理解 (C)列出 (D)欣賞【解答：C】
下列何者最符合行為目標的敘寫方式？ (A)學生能熟悉正方形體積的求法 (B)學生能探究蠶寶寶蛻變的過程 (C)能培養學生喜愛學習數學的興趣 (D)學生能正確畫出三角形底邊的高【解答：D】
下列哪一項學習目標的敘寫方式，最符合學習結果導向的觀點？ (A)學生練習電腦軟體的操作步驟 (B)學生學習如何正確使用量角器 (C)學生進行科學實驗並討論結果 (D)學生能解釋文章中的因果關係【解答：D】
「張老師利用簡報軟體向學生說明『象形』與『指事』造字法則，再進一步綜合比較...」下列何者最能表達前述的教學重點，並符合行為目標敘寫的基本要求？ (A)學生能分辨「象形」與「指事」造字法則的不同 (B)教師能設計「象形」與「指事」... (C)學生能利用簡報軟體說明... (D)教師協助學生操作...【解答：A】
教師在教學前須確定教學目標並敘寫清楚的行為目標。下列哪一項最符合行為目標敘寫的方式？ (A)提升學生中文識字的能力 (B)教師能培養學生三種社交技巧 (C)學生能說出三種常見植物的名稱 (D)學生能仔細觀察毛毛蟲的生長過程【解答：C】
小琪是國中二年級重度智能障礙學生，其優勢能力是對圖畫與相片有興趣，但不喜歡坐著的活動，下列哪一項個別化教育計畫目標的敘寫，較符合她的學習需求？ (A)連續兩週...自行翻閱相簿... (B)連續兩週，每週4次，能應用溝通簿表達5種需求 (C)連續10天...能單腳站立... (D)連續10天...能自行套5個圈圈【解答：B】
下列哪一選項較符合行為目標的敘述方式？甲、學生能從 10 張動物圖卡中，正確命名 8 種 乙、學生能大聲朗讀句子 5 次後... 丙、學生能有效區辨教師所發出的... 丁、學生能以 50 分貝的音量發出「ㄚ」並持續 20 秒以上 (A)甲丙 (B)甲丁 (C)乙丙 (D)乙丁【解答：B】
針對身心障礙學生的教學，下列哪一項教學目標的敘寫較為適當？ (A)在輔助線的提示下... (B)在教師口語的提示下，正確穿上有拉鍊的夾克 (C)在圖形的提示下... (D)在教師肢體的協助下...【解答：B】
在「我愛上學」的單元中，下列何者屬於行為目標之敘述？ (A)培養幼兒愛校情操 (B)培養幼兒與人互動的能力 (C)建立幼兒對上學的認識 (D)能在團討中清楚表達自己的意見【解答：D】

主題四：蓋聶 (Gagné) 學習條件論
【觀念重點】 蓋聶認為學習具階層性，由簡入繁分為八種（如辨別、概念、原則學習與問題解決）。強調內在學習歷程與外在教學條件（如教師增強、提示目標以引發期望）的配合。學習結果分五大類：心智技能（概念與原則）、認知策略、語文訊息、動作技能與態度。
【全部題目】
蓋聶(R. Gagné)學習階層的後四個階層：辨別學習、概念學習、原則學習及問題解決，符合下列哪一理論？ (A)人本心理學 (B)發展心理學 (C)認知心理學 (D)行為主義心理學【解答：C】
蓋聶(R. Gagné)認為學習應該具有階層性，並將學習階層分為八種。王老師在進行數學教學時，引導學生觀察圓錐和圓柱體的差異並作比較。此屬於蓋聶所主張的哪一種學習階層？ (A)符號學習 (B)原則學習 (C)概念學習 (D)問題解決【解答：B】
林老師應用蓋聶(R. Gagné)學習階層的概念進行教學設計。下列何者應為其教學的最後步驟？ (A)引發表現 (B)評估表現 (C)提供回饋 (D)增進保留與遷移【解答：D】
蓋聶(R. Gagné)認為要增進學生學習效果，必須提供相關的學習條件。「教師的增強」屬於下列何種學習條件？ (A)內在條件 (B)外在條件 (C)中介條件 (D)先備條件【解答：B】
依照蓋聶(R. Gagné)的學習條件論，下列有關內在學習歷程的敘述，何者正確？ (A)教師提醒學生注意...此為「期望」 (B)教師請學生回想過去所學...此為「選擇知覺」 (C)教師請學生將課文中各種修辭法整理成表格以比較並釐清其差異，此為「語意性編碼」 (D)教師問學生...給予回饋...此為「類化」【解答：C】
李老師在開始教導新單元時，都會主動且明確地告訴學生這個單元的學習目標。依據蓋聶的觀點，李老師的這種行為可以引發學生何種內在歷程？ (A)形成期望 (B)感應接收 (C)產生回應 (D)增強作用【解答：A】
根據蓋聶(R. Gagné)學習條件論的觀點，當教師進行分辨 1 元和 10 元幣值的教學時，下列敘述何項錯誤？ (A)幼兒要能分辨...要先具備...這是學習內在條件 (B)當幼兒在買賣遊戲中將 1 元硬幣誤認為 10 元硬幣時，教師應靜默待幼兒自我發現 (C)兩位老師分別扮演顧客和老闆...可引發幼兒的注意力 (D)請幼兒觀察描述...有助於...存入長期記憶...【解答：B】
依據蓋聶(R. Gagné)對於「教學事件」(instructional events)的分類，「教師要求學生解釋練習題的答案」屬於哪一類？ (A)提示教學目標 (B)提供教材內容 (C)指導學生學習 (D)引發學習表現【解答：D】
「能正確比較十萬以內兩數的大小」，此較屬於蓋聶(R. Gagné)主張的哪一類學習結果？ (A)心智技能 (B)動作技能 (C)語文訊息 (D)認知策略【解答：A】
根據蓋聶(R. M. Gagné)的理論，概念和原則屬於下列哪一種學習結果？ (A)心智技能 (B)認知策略 (C)語文訊息 (D)態度【解答：A】

主題五：Bloom 認知領域目標分類
【觀念重點】 教學目標分為認知、情意、技能三大領域。認知領域由低至高為：記憶(瞭解)、理解、應用、分析、評鑑、創造。理解如轉換表徵；應用如使用工具實測；分析如釐清因果關係或組織結構；評鑑涉及對優劣價值的判斷；創造為最高層次，包含設計、規劃與提出新奇的解決方案。
【全部題目】
布魯姆(B. Bloom)將教學目標分為哪三大領域？ (A)真、善、美 (B)語文、數字、空間 (C)事實、技能、態度 (D)認知、情意、技能【解答：D】

主題六：情意與技能領域目標
【觀念重點】 情意領域 (Krathwohl) 涉及態度與價值，由低至高為：接納(接受)、反應、價值判斷、價值組織、品格形成。最低層次為接納，最高層次「品格形成」強調將信念內化為個人一致的行為與品格。技能領域 (Simpson) 的最高層次為「創新」，重視在動作中展現熟練度與創造獨特性。

主題七：教學設計、教學活動轉換與學習心流
【觀念重點】 教學設計的核心在於引導學生主動學習，建構式教學強調學習者的主觀經驗。選擇學習經驗時應考量動機原則、能力範圍與效果原則。「心流」產生於個人技能與挑戰層次高度一致時，會使學生渾然忘我。在班級經營的教學活動轉換中，建立慣例或控制轉換流程是避免失序的重要作法。
【全部題目】

「任何科目都可藉由某種方式教給任何兒童」，下列哪一個敘述，不是這句話所要強調的？ (A)提早教學是不好的 (B)不須太重視學習準備度 (C)瞭解學生、組織並有效呈現教材等技巧的重要性 (D)成熟不一定要等待，也可以藉由外力協助而達成【解答：A】
「眼睛的功能不同於照相機...」根據以上敘述，下列何者不是教師進入課堂時應優先考量的教學事項？ (A)變化教學情境... (B)形成求知心態... (C)配合學生經驗... (D)提供教材內容：以教材為媒介，老師開始明確地講解教材內容【解答：D】
經由仔細的觀察，張老師發現小明喜歡直接、動手的經驗，並且偏好有組織、有結構的呈現方式。下列哪一種教學方式對小明最適合？ (A)閱讀書籍 (B)團體討論 (C)模擬遊戲 (D)實驗操作【解答：D】
採用塔巴教學策略進行單元的教學時，針對本單元的教學目標，下列哪一項教學策略最合適？ (A)概念發展 (B)資料解釋 (C)運用通則 (D)解決衝突【解答：B】
陳老師在上課時，會隨時因應學生的學習速度、提供多樣性的教材內容、調整評量的內容，也會調整教師的角色與任務。陳老師是採用下列何種教學策略？ (A)個別化教學策略 (B)團體化教學策略 (C)擬人化教學策略 (D)目標化教學策略【解答：A】
下列何種教學策略把學生當成公司的股東，可分享公司的成長與虧損，並共同思考如何有益彼此成長空間？ (A)講述 (B)反省性教學 (C)分組 (D)發問與討論【解答：B】
李老師先引導學生觀察學校附近藻礁地形的照片，讓學生一起思考藻礁地形環境受到破壞的原因，接著請學生分組討論可能的解決方法後，上臺分享小組提出的行動策略。李老師的教學活動設計最接近下列何種方法？ (A)現象學思考 (B)反省性思維 (C)概念分析法 (D)蘇格拉底法【解答：B】
鄭老師在上「岳陽樓記」時，播放了有關岳陽樓的幻燈片。請問鄭老師是在進行教學上的哪一項行為？ (A)自學輔導 (B)引起動機 (C)社會化過程 (D)創造思考【解答：B】
撰寫教案中的「活動內容與過程」時，下列敘述何者較合宜？甲、「引起動機活動」要能引起幼兒學習興趣 乙、「結束活動」可以用來引起未來接續活動的動機 丙、「延伸活動」要和教案中其他活動於當日一起完成 丁、「發展活動」需考量的是班上幼兒整體發展狀況，而不是個別差異 (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：A】
下列哪一種教學過程的教師指導性最高？ (A)講解說明 (B)討論發現 (C)反覆練習 (D)學生自評【解答：A】
蔡老師極力主張環境教育的重要性，下列何者最接近其教學重點？ (A)探討人類如何控制環境 (B)致力於永續發展的社會 (C)聚焦於自然科學的課程 (D)強調宇宙普世主義思維【解答：B】
數學解題應注重推理過程與認知思維...歷史教學應重因果的理解...上述兩段敘述，比較符合下列哪一項有關教學重點的主張？ (A)廣度與深度應予平衡 (B)宜注重學生起點行為 (C)抽象應重於具體 (D)原則應重於事實【解答：D】
對於教學效果之敘述，下列何者不同於其他三項？ (A)能記住所「聽過」的15％... (B)聞之不若見之... (C)中人以上，可以語上也；中人以下，不可以語上也 (D)Tell me, I forget; show me, I remember. Involve me, I understand.【解答：C】
相較於傳統的教師中心教學，建構式的教學比較強調下列何者？ (A)教師的知識傳遞 (B)反覆的練習與記誦 (C)學習者的主觀經驗 (D)學習結果重於歷程【解答：C】
下列何者屬於教師中心的課程設計？ (A)師生一起討論... (B)教師說明各種造字原理及字形的演變 (C)學生飼養昆蟲... (D)學生蒐集地球暖化...【解答：B】
近年來，教師的教學觀由「教師教什麼」轉變為「學生學什麼」。此一轉變最接近下列何種理念？ (A)教師是教學的決定者... (B)教師先確定教學目標... (C)教師先了解教學內容... (D)教學的產生是因有學生，才需要教師進行教學【解答：D】
為達到雙語政策的目標，學校在實施非英語文科目的部定課程雙語教學時，下列哪些做法較為適切？甲、同步建置雙語學習環境 乙、要求學生使用全英語作答 丙、設法將教材內容完整翻譯成英文 丁、設法運用課室英語於教學過程中 戊、以學科知識教學為主，英語習得為輔 (A)甲乙丁 (B)甲丙戊 (C)甲丁戊 (D)乙丙丁【解答：C】
下列哪一種教學情境較可營造資優學生的「心流」(flow)狀態，產生最佳學習效果？ (A)當個人動機層次和挑戰層次... (B)當個人動機層次和技能層次... (C)當個人技能層次和挑戰層次兩者一致性很高時 (D)當個人思考層次和挑戰層次...【解答：C】
有關M. Csikszentmihalyi所提「心流」(flow)的敘述，下列哪些較為適切？甲、通常是一種永久性、客觀的體驗 乙、挑戰越高，個體越容易產生心流 丙、聚精會神，渾然忘我，行為和意識高度統一 丁、感受活動本身帶來樂趣，不必靠外在的酬賞 (A)甲乙 (B)甲丁 (C)乙丙 (D)丙丁【解答：D】
黃老師所設計的學習單，旨在透過問題的呈現...最能凸顯下列哪一種功能？ (A)補充教材 (B)學習評量 (C)延伸探索 (D)活動指引【解答：C】
張老師得知其班級學生對日本電視劇「半澤直樹」非常著迷...將...作為例子，來讓同學進行分組討論...張老師的做法符合下列何種學習經驗選擇的原則？ (A)動機原則 (B)經濟原則 (C)繼續原則 (D)練習原則【解答：A】
王老師為讓學生瞭解自己的數學程度，並力求精進，設計一份具挑戰性的數學習題...王老師的作法係應用下列哪一項課程選擇原則？ (A)效果原則 (B)動機原則 (C)能力原則 (D)指導原則【解答：C】
下列有關課程中學習經驗選擇的原則，何者有誤？ (A)學習經驗要能符合學生的能力範圍 (B)學習經驗的安排要能夠花費最少的經費 (C)為達課程目標，學生要有練習目標行為的經驗 (D)所提供的學習經驗，要讓學生獲得滿足感與成就感【解答：B】
在時間有限的情況下，學生應該優先學習重要的內容。根據這項原則，教師在選擇學習內容時，下列何者不應列為優先選項？ (A)學科領域中的艱深內容 (B)知識和文化中的基本內容 (C)具有應用性和遷移性的內容 (D)富含探究方法和探究精神的內容【解答：A】
下列何者不屬於選擇學習經驗的一般原則？ (A)顧及學生知識和能力所能及的範圍 (B)同一學習經驗通常會產生幾種結果 (C)不同經驗無法達成同樣的教育目標 (D)提供學生演練達成目標行為的機會【解答：C】
蔡老師進行課程設計時，認為學習經驗的選擇不應侷限於教科書既有的知識內容，也可採納其他不同來源的教材內容。此種做法較符合下列何種課程選擇的原則？ (A)課堂中提供學生有具體表現的學習機會 (B)同樣的學習活動可滿足不同的教育目標 (C)提供符合學生程度難易適中的學習經驗 (D)同樣的教育目標可由不同學習經驗達成【解答：D】
下列何者不屬於綜合活動學習領域的主要學習目標？ (A)獲得事實知識 (B)省思個人意義 (C)實踐體驗所知 (D)擴展學習經驗【解答：A】
下列有關教學設計的認知，何者有誤？ (A)教學設計以總結性評量為主 (B)學生是教學設計的核心所在 (C)教學媒體的選擇宜考量教學目標 (D)教學目標的實現須仰賴良好的教學策略【解答：A】
下列何者是系統化教學設計的優點？ (A)自動產生創意教材 (B)過程合乎科學邏輯 (C)激發教師的教學熱誠 (D)避免「見樹不見林」的缺失【解答：B】
對於線性模式的教學設計方式，下列敘述，何者較為正確？ (A)將步驟化繁為簡 (B)執行時間花費較多 (C)不須擬定教學目標 (D)強調彈性並隨時修改【解答：A】
張老師批改作業之後，總是儘速發還給學生... 此作法屬於「教學的一般模式」中的哪一項？ (A)評鑑 (B)預估 (C)回饋環線 (D)教學目標【解答：C】
下列有關小學低年級教學設計，何者不適切？ (A)具體的內容先於抽象的內容 (B)古代的內容先於現代的內容 (C)學過的內容先於未學過的內容 (D)熟悉的內容先於不熟悉的內容【解答：B】
建築師在建造房子之前要先繪製藍圖...同理，教師在進行教學前要做何種準備？ (A)購買參考書 (B)選用教科書 (C)編擬教學計畫 (D)熟悉學生習作【解答：C】
教師在教學計畫中，訂定了「能夠獨立地評論媒體訊息的可信度」的目標。下列何者比較能夠達成此目標？ (A)閱讀一篇媒體報導，並撰寫心得 (B)閱讀兩個廣告... (C)閱讀一個廣告... (D)閱讀一篇新聞報導，並找出報導者未言明的前提【解答：D】
下列哪一種校外教學活動最有助於「生命中心倫理」的學習？ (A)到坪林放天燈 (B)到野外踏青觀察動植物 (C)到野外捕捉昆蟲做成標本 (D)到休閒農場與放山雞玩捉迷藏【解答：B】
許老師認為在進行組內共學之前，要先安排自學活動... 下列哪些學生自學活動做法，較能確認學生學會基礎知識？甲、觀看影片並閱讀教材 乙、閱讀教材並完成教師設計的學習單 丙、觀看講解段落大意的影片 丁、觀看影片並回答影片中的提問 (A)甲乙 (B)甲丙 (C)乙丁 (D)丙丁【解答：C】
當教師使用主題網發展主題活動，於選擇主題後，接下來的步驟是什麼？ (A)畫主題網→寫下目標→寫下概念→寫下活動 (B)寫下目標→寫下概念→寫下活動→畫主題網 (C)寫下概念→寫下活動→畫主題網→寫下目標 (D)寫下活動→畫主題網→寫下目標→寫下概念【解答：A】
分組活動為幼兒園常見的活動型態之一。下列關於分組活動的敘述，何者正確？ (A)分組活動可以延續團體活動，讓幼兒深化主題的學習 (B)分組活動不論人力... (C)教師在指導某一組時... (D)分組活動是以小組為單位...【解答：A】
過年前，老師為了增進中班幼兒對於過年習俗的認識，設計一系列的相關活動。下列哪一項活動設計較不適切？ (A)引導幼兒分享家中以往過年的經驗及感受 (B)引導幼兒搜集年節物品... (C)邀請家長來園介紹自家的過年方式... (D)當有些幼兒對拜年感興趣時，立即帶領全班幼兒到社區內進行拜年【解答：D】
兩個教學活動間的交替稱為轉換過程。下列哪些是影響教學活動轉換困難最為關鍵的因素？甲、學生還處在前一個教學活動中... 乙、一節課有許多不同的活動要進行... 丙、老師或學生未能依照預訂的時間，因此延遲了... 丁、學生通常會對下一個活動感到很興奮... 戊、學生未被清楚告知在教學活動的轉換過程中，應該要遵循的行為或規則是什麼 (A)甲乙丙 (B)甲丙戊 (C)乙丙丁 (D)乙丁戊【解答：B】
課堂活動的銜接或轉換(transition)如果沒有妥善控制，可能會浪費時間... 下列哪一種作法較難順暢地進行課堂活動轉換？ (A)給予學生語文提示... (B)建立課堂活動慣例... (C)控制轉換時間，在活動時間結束時就立刻轉換 (D)以非語文信號集中學生注意力...【解答：C】
主題八：教學原則、教師發問技巧與教學資源檔案
【觀念重點】 教學原則涵蓋準備原則（喚起舊經驗）、同時學習原則（主學習伴隨態度副學習）、社會化原則與過度學習（特別適用於記憶缺陷的特教學生）。在發問上，教師可運用「轉問」或「深入探究」技巧引發高層次思考。在回應上應採取「反應式傾聽」，如「我知道你有一點難過」。教學資源包含經費、設備與時間等；而教學檔案的目的在反思並提高教學效果，學習檔案則需讓幼兒參與收集。
【全部題目】
陸老師在教導七年級數學「質因數分解」主題之前，先喚起學生在國小時學習因數的舊經驗...此種教學方式符合下列哪一項學習原則？ (A)自動原則 (B)準備原則 (C)熟練原則 (D)時近原則【解答：B】
在進行「美濃好好玩」的主題時，下列有關教學原則應用的敘述何者正確？ (A)「實地探索...」—個別原則 (B)「主題進行前，在教室的主題區中營造美濃客家情境並放置客家兒歌 CD」—準備原則 (C)「參訪美濃傘...」—熟練原則 (D)「主題進行中...」—增強原則【解答：B】
小奇老師在規劃「我們的社區」主題前，先去社區進行踏查，蒐集社區中可做為教學資源的人、事、物，此作為符合下列哪一項教學原則？ (A)準備原則 (B)類化原則 (C)社會化原則 (D)同時學習原則【解答：A】
在歷史課中，教師放映南宋名將岳飛的電影給學生看，學生不僅學習到...也對岳飛精忠報國的精神深表感佩。這是哪一種原則的實踐？ (A)個別化原則 (B)充份參與原則 (C)同時學習原則 (D)漸次增強原則【解答：C】
有關教學活動及其所運用教學原則的敘述，下列何者正確？ (A)在進行...這是「熟練原則」 (B)在進行「觀察大樹部位」的活動時，也引導幼兒觀賞樹的姿態和美感，這是「同時學習原則」 (C)在進行...這是「自動原則」 (D)在進行...這是「社會化原則」【解答：B】
將培養幼兒數概念的活動設計成拼圖遊戲、實物與數字卡的配對...讓幼兒自由選組輪流操作。這是符合幼兒學習經驗的哪一項原則？ (A)生活性原則 (B)適切性原則 (C)多樣性原則 (D)統整性原則【解答：C】
在教學中，以日常生活事例作為切入的問題，來進行探討科學概念的活動。請問這樣的教學過程符合下列哪一種原則？ (A)由難至易 (B)由繁入簡 (C)由抽象到具體 (D)由經驗到知識【解答：D】
自然與生活科技教師以日常生活事例作為切入的問題，引導學生探討自然科學知識。此種教學方法與下列哪一種概念有關？ (A)由難至易 (B)由繁入簡 (C)由抽象到具體 (D)由經驗到知識【解答：D】

        // --- 資料解析函數 ---
        function parseData(rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l);
            const topics = [];
            let currentTopic = null;
            let currentSubtopic = null;
            let isParsingConcepts = false;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (line.startsWith('主題')) {
                    currentTopic = { title: line, concepts: "", subtopics: [] };
                    topics.push(currentTopic);
                    currentSubtopic = null;
                    isParsingConcepts = false;
                } else if (line.startsWith('【觀念重點】')) {
                    isParsingConcepts = true;
                    if(currentTopic) currentTopic.concepts += line.replace('【觀念重點】', '').trim() + "\n";
                } else if (line.startsWith('【全部題目】')) {
                    isParsingConcepts = false;
                    const subTitle = line.replace('【全部題目】', '').trim() || '綜合練習';
                    currentSubtopic = { title: subTitle, questions: [] };
                    if(currentTopic) currentTopic.subtopics.push(currentSubtopic);
                } else if (isParsingConcepts && currentTopic) {
                    currentTopic.concepts += line + "\n";
                } else if (line.includes('【解答：')) {
                    // 找到了題目
                    if (!currentSubtopic && currentTopic) {
                        currentSubtopic = { title: '綜合練習', questions: [] };
                        currentTopic.subtopics.push(currentSubtopic);
                    }

                    // 使用 indexOf 解析避免不規則的空格問題
                    const idxA = line.lastIndexOf('(A)');
                    const idxB = line.lastIndexOf('(B)');
                    const idxC = line.lastIndexOf('(C)');
                    const idxD = line.lastIndexOf('(D)');
                    const idxAns = line.lastIndexOf('【解答：');
                    
                    if (idxA !== -1 && idxB !== -1 && idxC !== -1 && idxD !== -1 && idxAns !== -1 && currentSubtopic) {
                        // 擷取解答與結尾備註
                        const ansMatch = line.match(/【解答：([A-D])】(.*)/);
                        const answer = ansMatch ? ansMatch[1].trim() : '';
                        const note = ansMatch && ansMatch[2] ? ansMatch[2].trim() : '';

                        currentSubtopic.questions.push({
                            text: line.substring(0, idxA).trim(),
                            options: [
                                { label: 'A', text: line.substring(idxA + 3, idxB).trim() },
                                { label: 'B', text: line.substring(idxB + 3, idxC).trim() },
                                { label: 'C', text: line.substring(idxC + 3, idxD).trim() },
                                { label: 'D', text: line.substring(idxD + 3, idxAns).trim() }
                            ],
                            answer: answer,
                            note: note
                        });
                    }
                } else if (!isParsingConcepts && currentTopic) {
                    // 若不是概念、不是題目，有可能是新的子分類標題
                    if (!line.includes('(A)') && !line.includes('解答')) {
                        currentSubtopic = { title: line, questions: [] };
                        currentTopic.subtopics.push(currentSubtopic);
                    }
                }
            }

            // 清理沒有題目的空子主題
            topics.forEach(t => {
                t.subtopics = t.subtopics.filter(st => st.questions.length > 0);
            });

            return topics.filter(t => t.subtopics.length > 0);
        }

                                            <div key={tIdx} className="bg-gray-950 rounded-lg p-4 border border-gray-800">
                                                <h3 className="font-semibold text-lg text-blue-300 mb-3">{topic.title}</h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pl-2">
                                                    {topic.subtopics.map((subtopic, sIdx) => (
                                                        <button 
                                                            key={sIdx}
                                                            onClick={() => onSelectQuiz(topic, subtopic)}
                                                            className="text-left py-2 px-4 bg-gray-800 hover:bg-blue-600 hover:text-white text-gray-300 rounded-md border border-gray-700 transition-colors flex justify-between items-center"
                                                        >
                                                            <span className="truncate pr-2">{subtopic.title}</span>
                                                            <span className="text-xs bg-gray-900 px-2 py-1 rounded-full">{subtopic.questions.length} 題</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // 測驗組件
        function Quiz({ topic, subtopic, onBack }) {
            const [currentQIdx, setCurrentQIdx] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);

            const questions = subtopic.questions;
            const currentQ = questions[currentQIdx];

            const handleOptionClick = (optionLabel) => {
                if (selectedOption) return; // 已作答不可更改
                setSelectedOption(optionLabel);
            };

            const handleNext = () => {
                if (currentQIdx < questions.length - 1) {
                    setCurrentQIdx(currentQIdx + 1);
                    setSelectedOption(null);
                    setShowExplanation(false);
                }
            };

            const isCorrect = selectedOption === currentQ.answer;

            return (
                <div className="max-w-3xl mx-auto w-full">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="text-gray-400 hover:text-white flex items-center transition-colors">
                            <i className="ph ph-arrow-left mr-2"></i>回目錄
                        </button>
                        <div className="text-sm text-gray-400 bg-gray-900 px-3 py-1 rounded-full border border-gray-800">
                            題目 {currentQIdx + 1} / {questions.length}
                        </div>
                    </div>

                    {/* Topic Context */}
                    <div className="mb-6">
                        <h2 className="text-sm font-semibold text-blue-400 mb-1">{topic.title}</h2>
                        <h3 className="text-xl font-bold text-gray-100">{subtopic.title}</h3>
                    </div>

                    {/* Question Card */}
                    <div className="bg-gray-900 border border-gray-800 rounded-2xl shadow-xl p-6 md:p-8">
                        <p className="text-lg text-gray-200 mb-8 leading-relaxed">
                            {currentQ.text}
                        </p>

                        <div className="space-y-3 mb-8">
                            {currentQ.options.map((opt) => {
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 relative overflow-hidden ";
                                
                                if (!selectedOption) {
                                    btnClass += "border-gray-700 bg-gray-800 hover:bg-gray-700 hover:border-gray-500 text-gray-300";
                                } else {
                                    if (opt.label === currentQ.answer) {
                                        // 這是正確答案 (不管有沒有選它)
                                        btnClass += "border-green-500 bg-green-900/40 text-green-100";
                                    } else if (opt.label === selectedOption && !isCorrect) {
                                        // 這是選錯的答案
                                        btnClass += "border-red-500 bg-red-900/40 text-red-100";
                                    } else {
                                        // 其他未選的錯誤答案
                                        btnClass += "border-gray-800 bg-gray-900 text-gray-500 opacity-50";
                                    }
                                }

                                return (
                                    <button 
                                        key={opt.label}
                                        onClick={() => handleOptionClick(opt.label)}
                                        disabled={selectedOption !== null}
                                        className={btnClass}
                                    >
                                        <div className="flex">
                                            <span className="font-bold w-8 flex-shrink-0">({opt.label})</span>
                                            <span>{opt.text}</span>
                                        </div>
                                        {/* Status Icons */}
                                        {selectedOption && opt.label === currentQ.answer && (
                                            <i className="ph-fill ph-check-circle absolute right-4 top-1/2 transform -translate-y-1/2 text-2xl text-green-500"></i>
                                        )}
                                        {selectedOption && opt.label === selectedOption && !isCorrect && (
                                            <i className="ph-fill ph-x-circle absolute right-4 top-1/2 transform -translate-y-1/2 text-2xl text-red-500"></i>
                                        )}
                                    </button>
                                );
                            })}
                        </div>

                        {/* Actions & Feedback */}
                        <div className="min-h-[60px] flex justify-between items-center border-t border-gray-800 pt-6">
                            <div className="flex-1">
                                {selectedOption && (
                                    <div className={`flex items-center font-bold text-lg ${isCorrect ? 'text-green-500' : 'text-red-500'}`}>
                                        <i className={`ph-fill ${isCorrect ? 'ph-check-circle' : 'ph-x-circle'} mr-2 text-2xl`}></i>
                                        {isCorrect ? '答對了！' : `答錯了。正確解答為 (${currentQ.answer})`}
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex space-x-3">
                                {selectedOption && (
                                    <button 
                                        onClick={() => setShowExplanation(!showExplanation)}
                                        className="px-6 py-2 rounded-full border border-gray-600 text-gray-300 hover:bg-gray-800 transition-colors focus:outline-none"
                                    >
                                        <i className="ph ph-lightbulb mr-2"></i>
                                        {showExplanation ? '隱藏解析' : '看解析'}
                                    </button>
                                )}
                                
                                {selectedOption && currentQIdx < questions.length - 1 && (
                                    <button 
                                        onClick={handleNext}
                                        className="px-6 py-2 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-colors focus:outline-none"
                                    >
                                        下一題 <i className="ph ph-arrow-right ml-1"></i>
                                    </button>
                                )}
                                {selectedOption && currentQIdx === questions.length - 1 && (
                                    <button 
                                        onClick={onBack}
                                        className="px-6 py-2 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-colors focus:outline-none"
                                    >
                                        完成並回目錄 <i className="ph ph-check ml-1"></i>
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Explanation Box */}
                        {showExplanation && (
                            <div className="mt-6 p-5 bg-gray-950 border border-blue-900/50 rounded-xl animate-fade-in">
                                <h4 className="text-blue-400 font-bold mb-3 flex items-center">
                                    <i className="ph ph-info mr-2 text-xl"></i>觀念解析
                                </h4>
                                {currentQ.note && (
                                    <div className="mb-4 text-yellow-200 bg-yellow-900/20 p-3 rounded text-sm border border-yellow-800/50">
                                        <strong>本題備註：</strong> {currentQ.note.replace(/^\(註：/, '').replace(/\)$/, '')}
                                    </div>
                                )}
                                {topic.concepts ? (
                                    <div className="text-gray-300 text-sm whitespace-pre-line leading-relaxed">
                                        {topic.concepts}
                                    </div>
                                ) : (
                                    <div className="text-gray-500 text-sm italic">
                                        此主題暫無通用的觀念重點說明。
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 根組件
        function App() {
            const [currentView, setCurrentView] = useState('menu'); // 'menu' or 'quiz'
            const [selectedTopic, setSelectedTopic] = useState(null);
            const [selectedSubtopic, setSelectedSubtopic] = useState(null);

            const startQuiz = (topic, subtopic) => {
                setSelectedTopic(topic);
                setSelectedSubtopic(subtopic);
                setCurrentView('quiz');
                window.scrollTo(0,0);
            };

            const backToMenu = () => {
                setCurrentView('menu');
                setSelectedTopic(null);
                setSelectedSubtopic(null);
                window.scrollTo(0,0);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex justify-center">
                    {currentView === 'menu' && (
                        <Menu files={FILES_DATA} onSelectQuiz={startQuiz} />
                    )}
                    {currentView === 'quiz' && selectedTopic && selectedSubtopic && (
                        <Quiz 
                            topic={selectedTopic} 
                            subtopic={selectedSubtopic} 
                            onBack={backToMenu} 
                        />
                    )}
                </div>
            );
        }

        // 渲染 App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
